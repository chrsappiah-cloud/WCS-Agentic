name: Platform CI

on:
  push:
    branches: [main]
    paths:
      - "platform/**"
      - ".github/workflows/platform-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "platform/**"

jobs:
  orchestrator-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: node --test test/store.test.js

  python-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/agents/onboarding-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -c "import app; assert app.app"
