name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "implementation-pack/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "implementation-pack/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-tests:
    name: Swift package tests (API)
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: implementation-pack
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift test
        run: swift test

  docker-build:
    name: Docker build (Vapor starter)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: implementation-pack
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate compose file
        run: docker compose config

      - name: Build image
        run: docker compose build
